<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EagleScout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .login-container { max-width: 400px; margin: 100px auto; }
        .card { box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); }
        .google-btn { background-color: #4285f4; border-color: #4285f4; }
        .google-btn:hover { background-color: #357ae8; border-color: #357ae8; }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-container">
            <div class="card">
                <div class="card-body text-center p-5">
                    <h2 class="card-title mb-4">EagleScout</h2>
                    <p class="text-muted mb-4">Please sign in with your authorized Google account to continue</p>
                    <button onclick="window.location.href='/auth/?login=true'" class="btn btn-primary google-btn btn-lg w-100">
                        <i class="fab fa-google me-2"></i>
                        Sign in with Google
                    </button>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://kit.fontawesome.com/your-fontawesome-kit.js" crossorigin="anonymous"></script>
</body>
</html>
